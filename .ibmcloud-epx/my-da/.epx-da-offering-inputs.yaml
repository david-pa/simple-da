  branchName: dev_my-da_0.0.30
catalog:
  privateCatalogName: my-private-catalog
  privateCatalogDescription: Created by IBM Cloud Deployable Architecture Builder
  offeringTargetVersion: 0.0.30
  offeringProductName: ""
  offeringFlavorName: fullstack
  offeringFlavorInstallType: fullstack
  offeringDocsPath: ""
  offeringArchDiagramPath: ""
  offeringLicensePath: ""
  offeringReleaseNotesPath: ""
  catalogId: 5ef4e530-b569-45d2-ab1f-2037ae8e6cc4
  offeringId: 523786cb-004a-4494-b990-f68a62dd2a21
  devVersionId: ""
  publishedVersionId: ""
