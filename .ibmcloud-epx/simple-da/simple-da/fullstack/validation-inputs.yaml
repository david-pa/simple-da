



# This file provides input values used during validation of a Deployable Architecture (DA) in an IBM Cloud private catalog.

# IMPORTANT: This file will be modified automatically. User-modified input and output properties will be preserved 
# but additional user-provided comments will be lost.

# The "hidden" property on inputs is used to make sure that unnecessary values are not included in the validation process.
# If you do not want an input or output to be used during validation, set its "hidden" property to true. Hidden inputs and outputs will not be added to the ibm_catalog.json file.

inputs:
  prefix:
    description: A prefix for all resources to be created. If none provided a random
      prefix will be created
    type: string
    default: "sda99"
    type_metadata: string
    custom_config: {}
    hidden: false
  region:
    description: The region where to deploy the resources
    type: string
    default: us-south
    type_metadata: string
    custom_config: {}
    hidden: false
  tags:
    type: array
    default: '["terraform", "simple-da"]'
    type_metadata: list(string)
    custom_config: {}
    hidden: false
outputs:
  vpc_id:
    description: ID of the created VPC
    hidden: false
